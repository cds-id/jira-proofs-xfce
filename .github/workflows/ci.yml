name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson ninja-build gcc pkg-config \
            libglib2.0-dev libgtk-3-dev \
            libxfce4util-dev libxfce4ui-2-dev \
            libxfconf-0-dev libxfce4panel-2.0-dev \
            libexo-2-dev \
            libx11-dev libxi-dev libxext-dev libxfixes-dev \
            libcurl4-openssl-dev libjson-glib-dev \
            gettext

      - name: Configure
        run: meson setup build -Dwayland=disabled

      - name: Build
        run: meson compile -C build

      - name: Verify binary
        run: ./build/src/xfce4-screenshooter --help
